name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # Uses a highly stable release

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Rename APK to Cura Meal
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/cura_meal.apk

      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: cura-meal-app-release
          path: build/app/outputs/flutter-apk/cura_meal.apk
